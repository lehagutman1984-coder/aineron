upstream django {
    server web:8000;
}

# ==============================================
# 1. Редирект с HTTP (любой домен) на HTTPS (без www)
# ==============================================
server {
    listen 80;
    server_name aineron.ru www.aineron.ru;
    return 301 https://aineron.ru$request_uri;
}

# ==============================================
# 2. Редирект с HTTPS www на HTTPS без www
# ==============================================
server {
    listen 443 ssl http2;
    server_name www.aineron.ru;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    return 301 https://aineron.ru$request_uri;
}

# ==============================================
# 3. Основной HTTPS-сервер (без www)
# ==============================================
server {
    listen 443 ssl http2;
    server_name aineron.ru;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 100M;

    location /static/ {
        alias /static/;
    }

    location /media/ {
        alias /media/;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
