upstream django {
    server web:8000;
}

upstream nextjs {
    server frontend:3000;
}

upstream daphne {
    server daphne:9000;
}

# ==============================================
# 1. Редирект с HTTP (любой домен) на HTTPS (без www)
# ==============================================
server {
    listen 80;
    server_name aineron.ru www.aineron.ru;
    return 301 https://aineron.ru$request_uri;
}

# ==============================================
# 2. Редирект с HTTPS www на HTTPS без www
# ==============================================
server {
    listen 443 ssl http2;
    server_name www.aineron.ru;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    return 301 https://aineron.ru$request_uri;
}

# ==============================================
# 3. Основной HTTPS-сервер (без www)
# ==============================================
server {
    listen 443 ssl http2;
    server_name aineron.ru;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 100M;

    # ---------- Статика и медиа (Django) ----------
    location /static/ {
        alias /static/;
    }

    location /media/ {
        alias /media/;
    }

    # ---------- 301 редиректы: Django HTML → Next.js ----------
    location = /aitext/catalog/              { return 301 /models/; }
    location ~ ^/aitext/chatland/([^/]+)/$   { return 301 /models/$1/; }
    location ~ ^/aitext/chat/(\d+)/$         { return 301 /chat/$1/; }
    location = /aitext/files/                { return 301 /account/files/; }
    location = /users/pages/profile/         { return 301 /account/; }
    location = /users/pages/referral/        { return 301 /account/referral/; }
    location = /users/pages/privacy-policy/  { return 301 /privacy-policy/; }
    location = /users/pages/terms-of-service/ { return 301 /terms/; }

    # ---------- Django-маршруты ----------
    # Telegram Bot Webhook
    location /telegram/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # API для разработчиков (DRF)
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        # Поддержка SSE-стриминга
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Административная панель
    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Пользовательские API и страницы (Django)
    location /users/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # AI-чат и каталог (Django — до миграции на Next.js в ФАЗЕ 3)
    location /aitext/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Allauth
    location /accounts/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # ---------- Gitea ----------
    location /git/ {
        proxy_pass http://gitea:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    # ---------- WebSocket (Daphne / Django Channels) ----------
    location /ws/ {
        proxy_pass http://daphne;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- Studio sandbox preview ----------
    location ~ ^/studio/preview/(?<cid>[a-zA-Z0-9_]+)/(?<rest>.*)$ {
        resolver 127.0.0.11 valid=10s;
        set $sandbox_upstream http://$cid:3000/$rest;
        proxy_pass $sandbox_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ---------- Next.js (остальные маршруты) ----------
    location /_next/ {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Все остальные маршруты — Next.js (лендинг, каталог после миграции и т.д.)
    location / {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
