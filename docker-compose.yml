services:
  redis:
    image: redis:7-alpine
    container_name: neiro_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15-alpine
    container_name: neiro_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: postgres -c shared_buffers=512MB -c effective_cache_size=1536MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: neiro_web
    restart: unless-stopped
    env_file:
      - .env
    command: >
      sh -c "
      python manage.py makemigrations users &&
      python manage.py makemigrations landing &&
      python manage.py makemigrations aitext &&
      python manage.py makemigrations blog &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 8 --threads 2"
    volumes:
      - ./src:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: neiro_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A config worker --loglevel=info --pool=gevent --concurrency=200
    volumes:
      - ./src:/app
    ulimits:
      nofile: 65535
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: .
    container_name: neiro_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./src:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: https://aineron.ru/api/v1
        NEXT_PUBLIC_SITE_URL: https://aineron.ru
    container_name: neiro_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DJANGO_INTERNAL_URL=http://web:8000
    ports:
      - "3000:3000"
    depends_on:
      - web

  nginx:
    image: nginx:1.25-alpine
    container_name: neiro_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - ./src/media:/media
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - web
      - frontend

volumes:
  postgres_data:
  redis_data:
  static_volume:
