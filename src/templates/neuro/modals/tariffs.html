{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Тарифы | LUMEN</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="terms-url" content="{% url 'users_pages:terms_of_service' %}">
    <meta name="privacy-url" content="{% url 'users_pages:privacy_policy' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{% static 'neuro/css/index.css' %}">
    <link rel="stylesheet" href="{% static 'neuro/css/tariffs.css' %}">
</head>
<body>

<div class="tariffs-fullscreen-overlay" id="tariffsModalOverlay">
    <div class="tariffs-fullscreen-modal">
        <button class="tariffs-global-close" id="tariffsCloseBtn">
            <i class="fas fa-times"></i>
        </button>

        <div class="tariffs-container">
            <div class="tariffs-hero">
                <h1><span>Выберите</span> свой план</h1>
                <p>Идеальные тарифы для работы с нейросетями</p>
            </div>

            <h2 class="tariffs-title">Тарифы</h2>
            <p class="tariffs-subtitle">Подберите оптимальный вариант для ваших задач</p>

            <!-- Контейнер для динамической загрузки карточек -->
            <div class="tariffs-plans-grid" id="tariffsGrid">
                <div class="loading-spinner">Загрузка тарифов...</div>
            </div>

            <div class="tariffs-footer">
                <p>Продолжая, вы принимаете наше <a href="{% url 'users_pages:terms_of_service' %}">Пользовательское соглашение</a> и <a href="{% url 'users_pages:privacy_policy' %}">Политику Конфиденциальности</a></p>
            </div>
        </div>
    </div>
</div>

<script src="{% static 'neuro/js/tariffs.js' %}"></script>
</body>
</html>
