{% load static %}
<meta name="description" content="{{ seo_description }}">
{% if seo_keywords %}<meta name="keywords" content="{{ seo_keywords }}">{% endif %}
<meta property="og:locale" content="ru_RU">
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ site.name }}">
<meta property="og:url" content="{{ canonical_url }}">
<meta property="og:title" content="{{ seo_title }}">
<meta property="og:description" content="{{ seo_description }}">
<meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static '/images/home.png' %}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ seo_title }}">
<meta name="twitter:description" content="{{ seo_description }}">
<meta name="twitter:image" content="{{ request.scheme }}://{{ request.get_host }}{% static '/images/home.png' %}">
<link rel="canonical" href="{{ canonical_url }}">
