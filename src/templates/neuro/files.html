<!DOCTYPE html>
<html lang="ru">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta name="user-tariff-id" content="{{ user.tariff.id|default:'' }}">
    <title>{{ site.name }} · Мои файлы</title>
    <meta name="description" content="Ваши сгенерированные изображения, видео и другие файлы.">
    <meta name='image' content='https://{{ request.get_host }}{% static "/images/home.png" %}'>
    <!-- Open Graph general (Facebook, Pinterest & Google+) -->
    <meta property='og:locale' content='ru_RU'>
    <meta property='og:type' content='website'>
    <meta property='og:site_name' content='{{ site.name }}'>
    <meta property='og:url' content='https://{{ request.get_host }}/'>
    <meta property='og:title' content='{{ site.name }} · Мои файлы'>
    <meta property='og:description' content='Ваши сгенерированные изображения, видео и другие файлы.'>
    <meta property='og:image' content='https://{{ request.get_host }}{% static "/images/home.png" %}'>
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <!-- Twitter Card -->
    <meta name='twitter:card' content='summary_large_image'>
    <meta name='twitter:title' content='{{ site.name }} · Мои файлы'>
    <meta name='twitter:description' content='Ваши сгенерированные изображения, видео и другие файлы.'>
    <meta name='twitter:image' content='https://{{ request.get_host }}{% static "/images/home.png" %}'>
    <!-- Метатеги для устройств -->
    <meta name='msapplication-starturl' content='{{ site_url }}'>
    <meta name='application-name' content='{{ site.name }} · Мои файлы'>
    <meta name='apple-mobile-web-app-title' content='{{ site.name }} · Мои файлы'>
    <meta name='msapplication-tooltip' content='Ваши сгенерированные изображения, видео и другие файлы.'>
    <!-- Метатеги [end]-->
    <link rel="canonical" href="{{ request.build_absolute_uri }}">
    <!-- Иконки и стилизация -->
    <!-- Фавиконки -->
    <link rel='shortcut icon' type='shortcut icon' href='https://{{ request.get_host }}{% static "/images/favicon.ico" %}'>

    <!-- Иконки для iOS & Android -->
    <link rel='apple-touch-icon' sizes='60x60' href='https://{{ request.get_host }}{% static "images/apple-touch-icon-60x60.png" %}'>
    <link rel='apple-touch-icon' sizes='76x76' href='https://{{ request.get_host }}{% static "images/apple-touch-icon-76x76.png" %}'>
    <link rel='apple-touch-icon' sizes='120x120' href='https://{{ request.get_host }}{% static "images/apple-touch-icon-120x120.png" %}'>
    <link rel='apple-touch-icon' sizes='152x152' href='https://{{ request.get_host }}{% static "images/apple-touch-icon-152x152.png" %}'>
    <!-- Иконки для Microsoft -->
    <meta name='theme-color' content='#D63384'>
    <meta name='msapplication-tap-highlight' content='no'>
    <meta name='msapplication-TileColor' content='#D63384'>
    <meta name='msapplication-TileImage' content='https://{{ request.get_host }}{% static "images/mstile-144x144.png" %}'>
    <meta name='msapplication-wide310x150logo' content='https://{{ request.get_host }}{% static "images/mstile-wide.png" %}'>
    <meta name='msapplication-square70x70logo' content='https://{{ request.get_host }}{% static "images/mstile-small.png" %}'>
    <meta name='msapplication-square310x310logo' content='https://{{ request.get_host }}{% static "images/mstile-large.png" %}'>
    <meta name='msapplication-square150x150logo' content='https://{{ request.get_host }}{% static "images/mstile-medium.png" %}'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'neuro/css/sidebar.css' %}">
    <link rel="stylesheet" href="{% static 'neuro/css/index.css' %}">
    <link rel="stylesheet" href="{% static 'neuro/css/files.css' %}">
    <link rel="stylesheet" href="{% static 'neuro/css/tariffs.css' %}">
    <link rel="stylesheet" href="{% static 'neuro/css/stars_modals.css' %}">
{{ site_counter.counter_text|safe }}
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    {% include 'neuro/modals/delete_chat.html' %}

<div class="app">
    <!-- Подключение sidebar -->
    {% include 'neuro/sidebar.html' %}

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="main-content">
        <!-- Подключение header (вынесен отдельно) -->
        {% include 'neuro/main-header.html' %}

        <div class="files-container">
            <h1 class="files-title">Мои файлы</h1>

            <!-- Табы -->
            <div class="files-tabs">
                <button class="files-tab active" data-tab="all">Все файлы</button>
                <button class="files-tab" data-tab="images">Изображения</button>
                <button class="files-tab" data-tab="videos">Видео</button>
            </div>

            <!-- Сетка файлов -->
            <div class="files-grid" id="filesGrid"></div>
        </div>
    </div>
</div>

<!-- Модальное окно в стиле Instagram (без навигации) -->
<div class="file-modal-overlay" id="fileModalOverlay">
    <div class="file-modal">
        <!-- Кнопка закрытия -->
        <button class="file-modal-close" id="fileModalClose"><i class="fas fa-times"></i></button>

        <!-- Левая колонка: медиа -->
        <div class="file-modal-media" id="fileModalMedia"></div>

        <!-- Правая колонка: информация -->
        <div class="file-modal-sidebar" id="fileModalSidebar">
            <div class="file-modal-header">
                <div class="file-modal-title" id="fileModalTitle"></div>
                <div class="file-modal-date" id="fileModalDate"></div>
            </div>
            <div class="file-modal-details">
                <div class="file-modal-detail-item">
                    <span class="detail-label">Размер</span>
                    <span class="detail-value" id="fileModalSize"></span>
                </div>
                <div class="file-modal-detail-item">
                    <span class="detail-label">Тип</span>
                    <span class="detail-value" id="fileModalType"></span>
                </div>
                <div class="file-modal-detail-item">
                    <span class="detail-label">Загружен</span>
                    <span class="detail-value" id="fileModalUploaded"></span>
                </div>
            </div>
            <div class="file-modal-actions">
                <button class="file-modal-action-btn" id="fileModalDownload"><i class="fas fa-download"></i> Скачать</button>
                <button class="file-modal-action-btn" id="fileModalDelete"><i class="fas fa-trash"></i> Удалить</button>
            </div>
        </div>
    </div>
</div>

<!-- Подключение модалки тарифов -->
{% include 'neuro/modals/tariffs.html' %}
<script src="{% static 'neuro/js/sidebar.js' %}"></script>
<script src="{% static 'neuro/js/index.js' %}"></script>
<script src="{% static 'neuro/js/files.js' %}"></script>
<script src="{% static 'neuro/js/stars_modal.js' %}"></script>
</body>
</html>
