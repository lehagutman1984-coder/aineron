<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 — Страница не найдена</title>
    <link rel="shortcut icon" type="image/x-icon" href="{% static '/images/favicon.ico' %}">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border: 1px solid rgba(13,13,13,0.10);
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .code {
            font-size: 72px;
            font-weight: 800;
            line-height: 1;
            color: #0d0d0d;
            margin-bottom: 16px;
        }
        .title {
            font-size: 20px;
            font-weight: 600;
            color: #0d0d0d;
            margin-bottom: 8px;
        }
        .desc {
            font-size: 14px;
            color: rgba(13,13,13,0.55);
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #0d0d0d;
            color: #fff;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.15s;
        }
        .btn:hover { background: #1a1a1a; }
    </style>
</head>
<body>
    <div class="card">
        <div class="code">404</div>
        <h1 class="title">Страница не найдена</h1>
        <p class="desc">Она была перемещена или вы указали неверный адрес.</p>
        <a href="/" class="btn">Вернуться на главную</a>
    </div>
</body>
</html>
